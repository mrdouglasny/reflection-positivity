# formalization.yaml — https://github.com/mathlib-initiative/formalization.yaml (v0.3)
# Describes the `main` branch state (HEAD fc99535): 0 sorries, 0 custom axioms.
# Every headline declaration's `#print axioms` is [propext, Classical.choice, Quot.sound].
version: "v0.3"

project:
  name: "reflection-positivity"
  authors: ["Michael R. Douglas"]
  license: "Apache-2.0"            # README declares Apache 2.0; LICENSE file marked TODO (not yet committed)

sources:
  - title: "Axioms for Euclidean Green's functions"
    authors: ["Konrad Osterwalder", "Robert Schrader"]
    id: "10.1007/BF01645738"
    type: "paper"
    license: "proprietary"
    note: "OS I (Comm. Math. Phys. 31 (1973), 83–112); the OS3 reflection-positivity axiom + reconstruction."
  - title: "Axioms for Euclidean Green's functions II"
    authors: ["Konrad Osterwalder", "Robert Schrader"]
    id: "10.1007/BF01608978"
    type: "paper"
    license: "proprietary"
    note: "OS II (Comm. Math. Phys. 42 (1975), 281–305)."
  - title: "Quantum Physics: A Functional Integral Point of View"
    authors: ["James Glimm", "Arthur Jaffe"]
    id: "ISBN:978-0-387-96477-7"
    type: "textbook"
    license: "proprietary"
    note: "2nd ed., Springer (1987); Ch. 6 (lattice transfer matrix), Ch. 10 (chessboard), Ch. 19."
  - title: "The P(φ)₂ Euclidean (Quantum) Field Theory"
    authors: ["Barry Simon"]
    id: "ISBN:978-0-691-08144-3"
    type: "textbook"
    license: "proprietary"
    note: "Princeton (1974); Ch. III (OS axioms + lattice RP)."
  - title: "Infrared bounds, phase transitions and continuous symmetry breaking"
    authors: ["Jürg Fröhlich", "Barry Simon", "Thomas Spencer"]
    id: "10.1007/BF01608557"
    type: "paper"
    license: "proprietary"
    note: "FSS (Comm. Math. Phys. 50 (1976), 79–95); chessboard / infrared bounds. Background for the Chessboard/ track (currently a stub)."
  - title: "Phase transitions and reflection positivity. I. General theory and long range lattice models"
    authors: ["Jürg Fröhlich", "Robert Israel", "Elliott H. Lieb", "Barry Simon"]
    id: "10.1007/BF01940327"
    type: "paper"
    license: "proprietary"
    note: "FILS (Comm. Math. Phys. 62 (1978), 1–34); operator-level chessboard formulation. Background for the Chessboard/ track (currently a stub)."
  - title: "Reflection positivity, rank connectivity, and homomorphism of graphs"
    authors: ["Michael Freedman", "László Lovász", "Alexander Schrijver"]
    id: "10.1090/S0894-0347-06-00529-7"
    type: "paper"
    license: "proprietary"
    note: "FLS (J. Amer. Math. Soc. 20 (2007), 37–51); graph-theoretic RP. Background for the Graph/ track (currently a stub)."

status:
  scope: >
    A Mathlib-only library for reflection positivity (RP) in the
    Osterwalder–Schrader (continuous / measure-theoretic) setting. PROVED and
    sorry/axiom-free on `main`: (1) the abstract reflection inner product
    (F,G) ↦ ∫ F·(G∘θ) dμ with symmetry/additivity/translation self-adjointness;
    (2) reflection Cauchy–Schwarz, the L² bridge, and positivity of the form;
    (3) the ReflectionSystem pre-inner-product core and the physical Hilbert space
    Completion PosObs (OS reconstruction direction); (4) the GappedTransfer
    structure and the geometric-series susceptibility bound
    Σ_{n<N} |⟪v,Tⁿv⟫| ≤ ‖v‖²/(1−gap) plus its summable tsum form; (5) the OS/GNS
    transfer operator (self-adjoint, fixed vacuum), the Feynman–Kac bridge
    ⟪[f],Tⁿ[g]⟫ = ∫ f·(g∘τ^[n]∘θ) dμ, and the Lt-uniform variance bound; (6) the
    general kernel-iterate Feynman–Kac TRACE dictionary for a finite periodic
    lattice — partition_eq_trace (Z_n = Tr(Tⁿ)) and twoPoint_dictionary; (7) the
    Layer-B4 periodic averaged-susceptibility geometric bound and the connected
    two-point bound via the rank-1 ground projection. NOT yet covered (stubs,
    statements only): the Freedman–Lovász–Schrijver graph RP track (Graph/) and
    the chessboard / multiple-reflection estimates (Chessboard/). The
    LatticeTransferData → TransferSystem graph-to-transfer constructor is
    documented future work, not built.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms: []   # no custom axioms; only Lean/Mathlib core (propext, Classical.choice, Quot.sound)
  main_results:
    - declaration: "MeasureTheory.Measure.IsReflectionPositive.cauchySchwarz"
      file: "ReflectionPositivity/CauchySchwarz.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "reflection Cauchy–Schwarz |⟨F·θG⟩|² ≤ ⟨F·θF⟩·⟨G·θG⟩ for RP measures"
          source: "10.1007/BF01645738"
    - declaration: "ReflectionPositivity.ReflectionSystem"
      file: "ReflectionPositivity/PhysicalHilbertSpace.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "physical Hilbert space as the completion of the pre-inner-product quotient (OS reconstruction core)"
          source: "10.1007/BF01608978"
    - declaration: "ReflectionPositivity.GappedTransfer.susceptibility_le"
      file: "ReflectionPositivity/VarianceBound.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "transfer-matrix gap ⟹ susceptibility bound Σ_{n<N} |⟪v,Tⁿv⟫| ≤ ‖v‖²/(1−gap)"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "ReflectionPositivity.TimeTranslatedSystem.reflectionCorrelation_eq_inner_T_pow"
      file: "ReflectionPositivity/TransferConstruction.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "Feynman–Kac / Källén–Lehmann bridge ⟪[f],Tⁿ[g]⟫ = ∫ f·(g∘τ^[n]∘θ) dμ"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "ReflectionPositivity.TransferSystem.partition_eq_trace"
      file: "ReflectionPositivity/TransferSystem.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "partition function as transfer-matrix trace: Z_n = Tr(Tⁿ) via kernel iterates"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "ReflectionPositivity.TransferSystem.twoPoint_dictionary"
      file: "ReflectionPositivity/TransferSystem.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "two-point function as Tr(M_A Tᵗ M_B T^{n−t})/Tr(Tⁿ) via kernel iterates"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "ReflectionPositivity.averaged_susceptibility_bound"
      file: "ReflectionPositivity/AveragedSusceptibility.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "periodic wrap-around geometric bound Σ_d (r^d + r^{Nt−d}) ≤ (1+r)/(1−r)"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "ReflectionPositivity.GappedTransfer.connected_susceptibility_le"
      file: "ReflectionPositivity/ConnectedTwoPoint.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "connected two-point / susceptibility bound from the gap via the rank-1 ground projection P₁"
          source: "ISBN:978-0-387-96477-7"

automation:
  methods:
    - method: "agent"
      models: ["claude-opus-4-8", "claude-opus-4-7"]
      framework: "Claude Code"
      prompting_notes: >
        Primary (sole) prover: cycle-by-cycle proving with compiler-guided repair.
        Bulk of commits co-authored by Opus 4.8 (1M context); a single early commit
        by Opus 4.7. Some design docs note Gemini "vetting" of the operator-level
        chessboard formulation, but the Chessboard/ track is an unbuilt stub.
  notes: >
    Models detected from commit co-author trailers (40× Opus 4.8, 1× Opus 4.7);
    no CLAUDE.md / AGENTS.md / GEMINI.md present. README/docs mention Gemini
    cross-vetting of the (still-stub) chessboard design, but it produced no
    committed proofs, so it is not listed as a method.

fidelity:
  divergences: >
    Built abstractly rather than tied to any concrete model: the OS stack is over
    a generic measure μ with a measurable involution θ; the transfer constructions
    are generic over the time-slice space (kernel-iterate route) or over a
    TimeTranslatedSystem (GNS route), with the spectral gap supplied at
    instantiation. The Feynman–Kac trace dictionary is proved in the
    kernel-iterate (Fubini) form rather than via an abstract trace-class operator
    API. The discrete/graph (FLS) and chessboard tracks are stubbed (statements only).

review:
  status: "self-assessed"
  reviewers: []
  notes: >
    0 sorries and 0 custom axioms on `main` (HEAD fc99535); each headline
    declaration's #print axioms is [propext, Classical.choice, Quot.sound].
    Graph/ and Chessboard/ are stubs (planned-theorem statements in docstrings,
    no declarations). No LICENSE file is committed yet (README declares Apache 2.0).

